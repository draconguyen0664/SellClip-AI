server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: clip-service
          uri: ${CLIP_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/clips/**
        - id: ai-service
          uri: ${AI_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

