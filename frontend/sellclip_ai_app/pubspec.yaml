name: sellclip_ai_app
description: Flutter client for SellClip AI.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_sign_in: ^6.3.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logo_icon.png
    - assets/images/background onboard.png
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
